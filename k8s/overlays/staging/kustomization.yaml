apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

bases:
  - ../../base

configMapGenerator:
  - name: llm-judge-config
    behavior: merge
    literals:
      - environment=staging
      - llm_provider=openai
      - db_provider=supabase
      - log_level=DEBUG

# Staging replicas (fewer than production)
replicas:
  - name: llm-judge-api
    count: 2

images:
  - name: ghcr.io/your-org/llm-judge-api
    newTag: staging
