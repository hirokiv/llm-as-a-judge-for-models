apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

bases:
  - ../../base

# Production-specific patches
patchesStrategicMerge:
  - deployment-patch.yaml
  - ingress-patch.yaml

configMapGenerator:
  - name: llm-judge-config
    behavior: merge
    literals:
      - environment=production
      - llm_provider=azure_openai
      - db_provider=databricks
      - log_level=INFO

# Production replicas
replicas:
  - name: llm-judge-api
    count: 5

# Resource limits
images:
  - name: ghcr.io/your-org/llm-judge-api
    newTag: latest  # Replace with specific version tag in production
