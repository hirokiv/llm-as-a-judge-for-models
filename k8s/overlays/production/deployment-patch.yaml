apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-judge-api
spec:
  replicas: 5
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        env:
        - name: ENVIRONMENT
          value: "production"
