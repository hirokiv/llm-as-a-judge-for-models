# Pre-commit hooks for LLM-as-a-Judge
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - types-requests
        args: [--strict, --ignore-missing-imports]
        files: ^src/

  - repo: https://github.com/python-poetry/poetry
    rev: 1.8.0
    hooks:
      - id: poetry-check

  - repo: local
    hooks:
      - id: no-commit-to-main
        name: Don't commit directly to main
        entry: bash -c 'if [ "$PRE_COMMIT_FROM_REF" = "" ] && [ "$(git symbolic-ref HEAD 2>/dev/null)" = "refs/heads/main" ]; then echo "Direct commits to main are not allowed. Please use a feature branch."; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
