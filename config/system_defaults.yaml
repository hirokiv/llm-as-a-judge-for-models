# ==========================================
# システムデフォルト設定（MVP構成）
# ==========================================
# 最小限の設定のみを含みます。
# 高度な機能（認証、キャッシュ、監視等）は必要に応じて追加してください。

version: "1.0"

# ==========================================
# アプリケーション設定
# ==========================================
application:
  name: "LLM-as-a-Judge for Enterprise Systems"
  version: "1.0.0"
  environment: "${ENVIRONMENT}"  # development | staging | production

  api:
    host: "0.0.0.0"
    port: 8000
    reload: true              # development のみ
    workers: 1                # production では 4+

  debug:
    enabled: true             # development のみ
    log_level: "INFO"         # DEBUG | INFO | WARNING | ERROR

# ==========================================
# データベース設定
# ==========================================
database:
  provider: "${DB_PROVIDER}"  # supabase | databricks

  # Supabase（開発環境）
  supabase:
    url: "${SUPABASE_URL}"
    key: "${SUPABASE_KEY}"

  # Databricks（本番環境）
  databricks:
    server_hostname: "${DATABRICKS_SERVER_HOSTNAME}"
    http_path: "${DATABRICKS_HTTP_PATH}"
    access_token: "${DATABRICKS_ACCESS_TOKEN}"

# ==========================================
# LLM Provider設定
# ==========================================
llm:
  provider: "${LLM_PROVIDER}"  # openai | azure_openai

  # OpenAI
  openai:
    api_key: "${OPENAI_API_KEY}"
    timeout_seconds: 60

  # Azure OpenAI
  azure_openai:
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    api_key: "${AZURE_OPENAI_API_KEY}"
    api_version: "${AZURE_OPENAI_API_VERSION}"
    timeout_seconds: 60

# ==========================================
# MLflow設定
# ==========================================
mlflow:
  tracking_uri: "${MLFLOW_TRACKING_URI}"
  experiment_name: "llm-judge-evaluations"
  artifact_location: "./mlruns"

  # 自動ログ設定
  autolog:
    enabled: true
    log_models: true

# ==========================================
# 環境別オーバーライド
# ==========================================
environments:
  development:
    debug: true
    log_level: "DEBUG"
    workers: 1

  staging:
    debug: false
    log_level: "INFO"
    workers: 2

  production:
    debug: false
    log_level: "WARNING"
    workers: 4

# ==========================================
# メタデータ
# ==========================================
metadata:
  created_at: "2024-01-15"
  updated_at: "2026-05-14"
  version: "1.0-mvp"
  notes: |
    MVP構成：必須設定のみを含む。
    高度な機能（認証、キャッシュ、監視等）は必要に応じて追加。
