name: CD - Continuous Deployment

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # Artifact attestation disabled - requires organization-level settings
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@v1
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     subject-digest: ${{ steps.build.outputs.digest }}
      #     push-to-registry: true

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    # Disabled - requires Kubernetes cluster and KUBE_CONFIG_STAGING secret
    if: false && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://api.llm-judge.staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Staging
        run: |
          # Update image tag
          kubectl set image deployment/llm-judge-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop \
            -n staging

          # Wait for rollout
          kubectl rollout status deployment/llm-judge-api -n staging --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n staging
          kubectl get svc -n staging

      - name: Run smoke tests
        run: |
          # Port forward to test endpoint
          kubectl port-forward -n staging svc/llm-judge-api-service 8080:80 &
          sleep 5

          # Health check
          curl -f http://localhost:8080/health || exit 1

          echo "✅ Staging deployment successful"

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    # Disabled - requires Kubernetes cluster and KUBE_CONFIG_PRODUCTION secret
    if: false && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment:
      name: production
      url: https://api.llm-judge.production.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Production
        run: |
          # Use kustomize to apply production configuration
          kubectl apply -k k8s/overlays/production

          # Update image tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="latest"
          fi

          kubectl set image deployment/llm-judge-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            -n production

          # Wait for rollout
          kubectl rollout status deployment/llm-judge-api -n production --timeout=10m

      - name: Verify deployment
        run: |
          kubectl get pods -n production
          kubectl get svc -n production
          kubectl get ingress -n production

      - name: Run production smoke tests
        run: |
          # Test via Ingress (if configured)
          # curl -f https://api.llm-judge.production.example.com/health || exit 1

          # Or via port-forward
          kubectl port-forward -n production svc/llm-judge-api-service 8080:80 &
          sleep 5
          curl -f http://localhost:8080/health || exit 1

          echo "✅ Production deployment successful"

      - name: Notify deployment
        if: success()
        run: |
          echo "🎉 Production deployment completed successfully"
          # Add Slack/Discord/Email notification here

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          kubectl rollout undo deployment/llm-judge-api -n production
          kubectl rollout status deployment/llm-judge-api -n production
