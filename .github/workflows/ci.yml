name: CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"
  # Test environment variables
  DB_PROVIDER: supabase
  LLM_PROVIDER: openai
  ENVIRONMENT: test
  SUPABASE_URL: http://127.0.0.1:54321
  SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  OPENAI_API_KEY: sk-test-dummy-key
  MLFLOW_TRACKING_URI: http://localhost:5000

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run ruff lint
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Run ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check src/ tests/

      - name: Run mypy type check
        run: |
          source .venv/bin/activate
          mypy src/
        continue-on-error: true  # Allow mypy failures for now

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/unit/ -v --tb=short

      - name: Run setup tests
        run: |
          source .venv/bin/activate
          pytest tests/setup/ -v --tb=short

      - name: Run integration tests (without DB)
        run: |
          source .venv/bin/activate
          pytest tests/integration/ -v --tb=short -m "not requires_db"
        continue-on-error: true  # DB not available in CI

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest tests/unit/ tests/setup/ --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true  # Don't fail if codecov upload fails

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Test application import
        run: |
          source .venv/bin/activate
          python -c "from src.api.main import app; print('✓ FastAPI app imported successfully')"

      - name: Test models import
        run: |
          source .venv/bin/activate
          python -c "from src.models import JudgeResult, TestCaseScenario; print('✓ Models imported successfully')"

      - name: Test repositories import
        run: |
          source .venv/bin/activate
          python -c "from src.repositories import get_repository; print('✓ Repositories imported successfully')"
